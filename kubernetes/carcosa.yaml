apiVersion: v1
kind: Service
metadata:
    name: carcosa
    annotations:
        service.beta.kubernetes.io/aws-load-balancer-attributes: load_balancing.cross_zone.enabled=true
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-0ecb92c7f77bcde5d,subnet-0166cbe7bf8dba2ef
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
    selector:
        app: carcosa
    type: LoadBalancer
    ports:
        -   protocol: TCP
            port: 80
            targetPort: 1895
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: carcosa
spec:
    replicas: 2
    selector:
        matchLabels:
            app: carcosa
    template:
        metadata:
            labels:
                app: carcosa
        spec:
            containers:
                - name: carcosa
                  image: tomdenem1010/carcosa:IMAGE_TAG
                  volumeMounts:
                      - name: carcosa-secret-config
                        mountPath: /app/secret
                        readOnly: true
                  ports:
                      - containerPort: 1895
            volumes:
                - name: carcosa-secret-config
                  secret:
                      secretName: carcosa-secret-config