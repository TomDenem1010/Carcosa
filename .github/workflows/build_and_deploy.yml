name: Build and deploy Carcosa

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
#SETUP
        -   name: Checkout
            uses: actions/checkout@v4

        -   name: Set up Java
            uses: actions/setup-java@v4
            with:
                distribution: temurin
                java-version: "21"

        -   name: Compute image tag
            id: tag
            shell: bash
            run: |
                echo "tag=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

        -   name: Decode config 
            run: | 
                echo "${{ secrets.SECRET_PROPERTIES }}" | base64 -d > /secret/application-secret.properties
#DOCKER
        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

        -   name: Log in to Docker Hub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

        -   name: Build and push Docker image
            uses: docker/build-push-action@v6
            with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/carcosa:${{ steps.tag.outputs.tag }}
#KUBERNETES
        -   name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v4
            with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}

        -   name: Login to Amazon ECR
            id: ecr
            uses: aws-actions/amazon-ecr-login@v2

        -   name: Configure kubectl
            run: |
                aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name carcosa

        -   name: Update image tag in manifest
            run: |
                sed -i "s|IMAGE_TAG|${{ steps.tag.outputs.tag }}|g" kubernetes/carcosa.yaml
                
        -   name: Deploy to Kubernetes
            run: |
                kubectl apply -f kubernetes/carcosa.yaml