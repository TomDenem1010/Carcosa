name: Build and deploy Carcosa

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compute image tag
        id: tag
        shell: bash
        run: |
          version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          timestamp=$(date -u +%Y%m%d%H%M%S)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          echo "tag=${version}-${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/carcosa:${{ steps.tag.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.CARCOSA_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart appVersion
        run: |
          sed -i "s/appVersion:.*/appVersion: \"${{ steps.tag.outputs.tag }}\"/" helm/carcosa/Chart.yaml

      - name: Package chart
        run: helm package helm/carcosa

      - name: Push chart
        run: helm push *.tgz oci://ghcr.io/${{ github.repository_owner }}/charts