<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Carcosa - Boardgame Plays</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="app">
    <aside class="sidebar" th:replace="~{fragments/nav :: nav(${activeMenu}, ${activeSubmenu})}"></aside>
    <div class="content">
        <main class="container">
            <div class="row" style="justify-content: space-between;">
                <h1>Play</h1>
                <button type="button" class="btn primary" id="createPlayBtn">Create</button>
            </div>

            <section class="card">
                <div class="row">
                    <form method="get" th:action="@{/boardgame/play}" class="filter-form">
                        <label>
                            Boardgame name
                            <input name="name" th:value="${name}"/>
                        </label>
                        <input type="hidden" name="sort" th:value="${sort}"/>
                        <input type="hidden" name="dir" th:value="${dir}"/>
                        <button class="btn primary" type="submit">Filter</button>
                    </form>
                </div>
            </section>

            <section class="card" style="margin-top: 12px;">
                <div class="scroll-area">
                    <table>
            <thead>
            <tr>
                <th><a th:href="@{/boardgame/play(name=${name}, sort='boardgame', dir=${sort=='boardgame' and dir=='asc' ? 'desc' : 'asc'})}">Boardgame</a></th>
                <th><a th:href="@{/boardgame/play(name=${name}, sort='playDate', dir=${sort=='playDate' and dir=='asc' ? 'desc' : 'asc'})}">Play date</a></th>
                <th><a th:href="@{/boardgame/play(name=${name}, sort='playerCount', dir=${sort=='playerCount' and dir=='asc' ? 'desc' : 'asc'})}">Player count</a></th>
                <th><a th:href="@{/boardgame/play(name=${name}, sort='win', dir=${sort=='win' and dir=='asc' ? 'desc' : 'asc'})}">Win</a></th>
                <th><a th:href="@{/boardgame/play(name=${name}, sort='funScore', dir=${sort=='funScore' and dir=='asc' ? 'desc' : 'asc'})}">Fun score</a></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${plays}">
                <td th:text="${p.boardgame.name}">Boardgame</td>
                <td th:text="${p.playDate}">PlayDate</td>
                <td th:text="${p.playerCount}">Players</td>
                <td th:text="${p.win}">Win</td>
                <td th:text="${p.funScore}">Fun</td>
            </tr>
            </tbody>
                    </table>
                </div>
            </section>

            <dialog id="createPlayDialog">
                <form id="createPlayForm">
                    <h3 class="dialog-title">Create play entry</h3>

                    <div class="row">
                        <label>
                            Boardgame
                            <select name="boardgameId" required>
                                <option value="">-- select --</option>
                                <option th:each="bg : ${boardgames}" th:value="${bg.id}" th:text="${bg.name}"></option>
                            </select>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Play date
                            <input name="playDate" type="date" required/>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Player count
                            <input name="playerCount" type="number" min="1" required/>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Win
                            <select name="win" required>
                                <option value="">-- select --</option>
                                <option value="SUCCESS">SUCCESS</option>
                                <option value="FAILURE">FAILURE</option>
                            </select>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Fun score
                            <input name="funScore" type="number" min="1" max="5" required/>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 12px; justify-content: flex-end;">
                        <button type="button" class="btn ghost" id="cancelPlayBtn">Cancel</button>
                        <button type="submit" class="btn primary">Save</button>
                    </div>
                </form>
            </dialog>
        </main>
    </div>
</div>

<script>
    const playDialog = document.getElementById('createPlayDialog');
    document.getElementById('createPlayBtn').addEventListener('click', () => playDialog.showModal());
    document.getElementById('cancelPlayBtn').addEventListener('click', () => playDialog.close());

    document.getElementById('createPlayForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;

        const boardgameId = Number(form.boardgameId.value);
        const playDate = form.playDate.value;
        const playerCount = Number(form.playerCount.value);
        const win = form.win.value;
        const funScore = Number(form.funScore.value);

        if (!boardgameId || !playDate || !playerCount || !win || !funScore) {
            alert('Missing required fields');
            return;
        }

        const payload = {
            id: null,
            boardgameId,
            playDate,
            playerCount,
            win,
            funScore,
            createdAt: null,
            updatedAt: null
        };

        const res = await fetch('/boardgamePlay/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            const text = await res.text();
            alert('Save failed: ' + text);
            return;
        }

        playDialog.close();
        window.location.reload();
    });
</script>
</body>
</html>
