<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Carcosa - Boardgames</title>
    <link rel="stylesheet" href="/app.css"/>
</head>
<body>
<div class="app">
    <aside class="sidebar" th:replace="~{fragments/nav :: nav(${activeMenu}, ${activeSubmenu})}"></aside>
    <div class="content">
        <main class="container">
            <h1>Boardgames</h1>

            <section class="card">
                <div class="row" style="justify-content: space-between;">
                    <h2 style="margin: 0;">List</h2>
                    <button type="button" class="btn primary" id="createBtn">Create</button>
                </div>

                <div class="row" style="margin-top: 12px;">
                    <form method="get" th:action="@{/boardgame/boardgames}" class="filter-form">
                        <label>
                            Name
                            <input name="name" th:value="${name}"/>
                        </label>
                        <input type="hidden" name="sort" th:value="${sort}"/>
                        <input type="hidden" name="dir" th:value="${dir}"/>
                        <button class="btn primary" type="submit">Filter</button>
                    </form>
                </div>

                <div class="scroll-area" style="margin-top: 12px;">
                    <table>
            <thead>
            <tr>
                <th>
                    <a th:href="@{/boardgame/boardgames(name=${name}, sort='name', dir=${dir=='asc' ? 'desc' : 'asc'})}">Name</a>
                </th>
                <th>Link</th>
                <th>Modify</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="bg : ${boardgames}">
                <td>
                      <span class="bg-name"
                          th:classappend="${bg.type.name() == 'EXPANSION' ? ' expansion' : ' basegame'}"
                          th:text="${bg.name}">Name</span>
                </td>
                <td>
                    <a th:href="${bg.bggLink}" target="_blank" rel="noopener noreferrer">link</a>
                </td>
                <td>
                    <button type="button" class="btn ghost modify-btn"
                            th:attr="data-id=${bg.id},data-name=${bg.name},data-type=${bg.type.name()},data-status=${bg.status.name()},data-bgg-link=${bg.bggLink}">
                        Modify
                    </button>
                </td>
            </tr>
            </tbody>
                    </table>
                </div>
            </section>

            <dialog id="createDialog">
                <form id="createForm">
                    <h3 class="dialog-title">Create boardgame</h3>

                    <input name="id" type="hidden"/>

                    <div class="row">
                        <label>
                            Name
                            <input name="name" required/>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Type
                            <select name="type" required>
                                <option value="">-- select --</option>
                                <option th:each="t : ${boardgameTypes}" th:value="${t.name()}" th:text="${t.name()}"></option>
                            </select>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            Status
                            <select name="status" required>
                                <option value="">-- select --</option>
                                <option th:each="s : ${boardgameStatuses}" th:value="${s.name()}" th:text="${s.name()}"></option>
                            </select>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 10px;">
                        <label>
                            BGG Link
                            <input name="bggLink" required/>
                        </label>
                    </div>

                    <div class="row" style="margin-top: 12px; justify-content: flex-end;">
                        <button type="button" class="btn ghost" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn primary">Save</button>
                    </div>
                </form>
            </dialog>
        </main>
    </div>
</div>

<script>
    const dialog = document.getElementById('createDialog');
    document.getElementById('createBtn').addEventListener('click', () => {
        const form = document.getElementById('createForm');
        form.reset();
        form.id.value = '';
        dialog.showModal();
    });
    document.getElementById('cancelBtn').addEventListener('click', () => dialog.close());

    document.querySelectorAll('.modify-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            const form = document.getElementById('createForm');
            form.reset();

            form.id.value = btn.dataset.id || '';
            form.name.value = btn.dataset.name || '';
            form.type.value = btn.dataset.type || '';
            form.status.value = btn.dataset.status || '';
            form.bggLink.value = btn.dataset.bggLink || '';

            dialog.showModal();
        });
    });

    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const idRaw = form.id.value;
        const id = idRaw ? Number(idRaw) : null;
        const payload = {
            id,
            name: form.name.value,
            type: form.type.value,
            status: form.status.value,
            bggLink: form.bggLink.value,
            createdAt: null,
            updatedAt: null
        };

        const res = await fetch('/boardgame/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            const text = await res.text();
            alert('Save failed: ' + text);
            return;
        }

        dialog.close();
        window.location.reload();
    });
</script>
</body>
</html>
