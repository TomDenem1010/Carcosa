<nav xmlns:th="http://www.thymeleaf.org" th:fragment="nav(activeMenu, activeSubmenu)">
    <div class="theme-picker" aria-label="Theme picker">
        <label>
            Theme
            <select id="themeSelect">
                <option value="cyber-abyss">Cyber Abyss</option>
                <option value="violet-rift">Violet Rift</option>
                <option value="toxic-reactor">Toxic Reactor</option>
                <option value="solar-flare">Solar Flare</option>
                <option value="crimson-dusk">Crimson Dusk</option>
            </select>
        </label>
    </div>

    <div class="nav">
        <ul>
            <li>
                <div class="nav-label" th:classappend="${activeMenu} == 'main' ? ' active' : ''">Main</div>
                <ul class="sub">
                    <li>
                        <a th:href="@{/main}" th:classappend="${activeMenu} == 'main' ? ' active' : ''">home</a>
                    </li>
                </ul>
            </li>
            <li>
                <div class="nav-label" th:classappend="${activeMenu} == 'boardgame' ? ' active' : ''">Boardgame</div>
                <ul class="sub">
                    <li>
                        <a th:href="@{/boardgame/boardgames}"
                           th:classappend="${activeSubmenu} == 'boardgames' ? ' active' : ''">boardgames</a>
                    </li>
                    <li>
                        <a th:href="@{/boardgame/group}"
                           th:classappend="${activeSubmenu} == 'group' ? ' active' : ''">group</a>
                    </li>
                    <li>
                        <a th:href="@{/boardgame/play}"
                           th:classappend="${activeSubmenu} == 'play' ? ' active' : ''">play</a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>

    <script>
        (function () {
            const storageKey = 'carcosa.theme';

            const applyTheme = (theme) => {
                document.documentElement.dataset.theme = theme;
            };

            const init = () => {
                const select = document.getElementById('themeSelect');
                if (!select) return;

                const saved = localStorage.getItem(storageKey);
                const initial = saved || 'cyber-abyss';
                applyTheme(initial);
                select.value = initial;
                if (!saved) {
                    localStorage.setItem(storageKey, initial);
                }

                select.addEventListener('change', () => {
                    const theme = select.value;
                    applyTheme(theme);
                    localStorage.setItem(storageKey, theme);
                    window.location.reload();
                });
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</nav>
